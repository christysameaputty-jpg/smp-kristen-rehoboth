<html lang="id">

<body class="bg-gradient-to-br from-blue-950 to-indigo-900 text-white min-h-screen flex items-center justify-center">

<div class="w-full max-w-sm text-center">

    <!-- Tombol kembali -->

        ← Kembali

        <div class="bg-white/10 p-3 rounded mb-3">
            <p class="text-sm text-green-200">NAMA LENGKAP</p>
            <p id="nama"></p>
        </div>

        <div class="bg-white/10 p-3 rounded mb-4">
            <p class="text-sm text-green-200">NISN</p>
            <p id="nisn"></p>
        </div>

        <p class="text-sm text-green-100">
            Semoga sukses di jenjang pendidikan selanjutnya 🎓
        </p>

    </div>
</div>

// AMBIL DATA DARI URL (dibersihkan)
const params = new URLSearchParams(window.location.search);
const namaInput = (params.get("nama") || "").trim().toUpperCase();
const nisnInput = (params.get("nisn") || "").trim();

// DEBUG (optional, bisa dihapus nanti)
// console.log("Input:", namaInput, nisnInput);

// CARI SISWA (LEBIH AKURAT)
const siswa = students.find(s => 
    s.nisn === nisnInput && 
    s.nama.toUpperCase().includes(namaInput)
);

if(siswa){
    document.getElementById("nama").textContent = siswa.nama;
    document.getElementById("nisn").textContent = siswa.nisn;

    if(siswa.foto){
        document.getElementById("foto").src = siswa.foto;
    } else {
        document.getElementById("foto").style.display = "none";
    }

}else{
    document.getElementById("nama").textContent = "❌ Data tidak ditemukan";
    document.getElementById("nisn").textContent = "Periksa kembali Nama & NISN";
    document.getElementById("foto").style.display = "none";
}

// tombol kembali
function kembali(){
    window.location.href = "index.html";
}
