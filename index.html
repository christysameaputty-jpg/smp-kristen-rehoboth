<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Kelulusan</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-950 to-indigo-900 text-white min-h-screen flex items-center justify-center">

<div class="text-center w-full max-w-md">
    
    <!-- Logo -->
    <img src="https://i.ibb.co.com/39tVvgbg/LOGO-YPPK7.png" class="w-20 mx-auto mb-4">

    <h1 class="text-2xl font-bold mb-2">SMP Kristen Rehoboth Ambon</h1>
    <p class="text-sm text-blue-300 mb-4">Tahun Ajaran 2025/2026</p>

    <div class="bg-white/10 p-6 rounded-xl backdrop-blur">
        <h2 class="text-xl font-bold mb-4">🎓 Pengumuman Kelulusan</h2>

        <form id="formLogin">
            <input type="text" id="nama" placeholder="Masukkan nama lengkap"
            class="w-full p-3 mb-3 rounded bg-white/20 text-white">

            <input type="text" id="nisn" placeholder="Masukkan NISN"
            class="w-full p-3 mb-4 rounded bg-white/20 text-white">

            <button class="w-full bg-blue-600 py-3 rounded font-bold hover:bg-blue-500">
                🔍 Cek Kelulusan
            </button>
        </form>
        
        <p id="error" class="text-red-400 mt-3 hidden"></p>
    </div>

    <p class="text-xs mt-6 text-white/40">© 2026 SMP Kristen Rehoboth Ambon</p>
</div>

<script>
// DATA SISWA (harus sama dengan hasil.html)
const students = [
  { nama: "ANASTASYA NACIKIT", nisn: "0116288455" },
  { nama: "AUREL FELICIA SALAKA", nisn: "0116647190" },
  { nama: "DANIEL ZEGEN WALUN", nisn: "0111852025" },
  { nama: "GWYNN CORRIE HWEINLY SILAHOOY", nisn: "0115837885"},
  { nama: "HENNY PARIURY", nisn: "0117876275"},
  { nama: "JANDRI RADJAWANE", nisn: "0111285502"},
  { nama: "JESLIN ANETA WARBAL", nisn: "0114630460"},
  { nama: "JOSUA ALVEN LIKUMAHUA", nisn: "0115900884"},
  { nama: "MAGDALENA PATTIASINA", nisn: "0118421957"},
  { nama: "MARC CRISTIANO REHATTA", nisn: "0116462610"},
  { nama: "MARTHEN IMANUEL NATANIAL DAWA", nisn: "0112265989"},
  { nama: "MICHAELLO REICHFORTHER PATTIWAELLAPIA", nisn: "3118011342"},
  { nama: "MESAK PARIURY", nisn: "0112745552"},
  { nama: "MISOLA RAHAMETAN", nisn: "0115145188"},
  { nama: "PUTRI JESLIN RADJAWANE", nisn: "0117212742"},
  { nama: "STEVEN RENHARD WERINUSSA", nisn: "0114405036"},
  { nama: "VIEDEY MAXEL LOPULALAN", nisn: "0115917837"},
  { nama: "WILDA SYARINI. SUGIATONO", nisn: "0129863047"},
  { nama: "YANTI MIZEL PARIURY", nisn: "0127282954"},

];

document.getElementById("formLogin").addEventListener("submit", function(e){
    e.preventDefault();

    const nama = document.getElementById("nama").value.trim().toUpperCase();
    const nisn = document.getElementById("nisn").value.trim();
    const err = document.getElementById("error");

    err.classList.add("hidden");

    // cek kosong
    if(!nama || !nisn){
        err.textContent = "Harap isi semua data!";
        err.classList.remove("hidden");
        return;
    }

    // cek data cocok atau tidak
    const siswa = students.find(s => 
        s.nisn === nisn && s.nama.includes(nama)
    );

    if(!siswa){
        err.textContent = "❌ Maaf data anda tidak valid!";
        err.classList.remove("hidden");
        return;
    }

    // jika valid → lanjut
    window.location.href = `hasil.html?nama=${encodeURIComponent(nama)}&nisn=${nisn}`;
});
</script>

</body>
</html>
